name: "Create tag and release"

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name (e.g. v1.2.3 or 'auto' to let GitVersion decide)"
        required: false
        default: "auto"
      release_notes:
        description: "Release notes for this tag"
        required: false
      create_release:
        description: "Create a GitHub Release for this tag"
        type: boolean
        default: true
      container_grype_fail_build:
        description: "Fail container workflow if Grype finds vulnerabilities (turn off for a release override)"
        type: boolean
        default: true

jobs:
  tag:
    # Required so we can dispatch the container workflow after tagging (tag push from GITHUB_TOKEN does not fire on.push.tags).
    permissions:
      contents: write
      actions: write
    uses: hwinther/reusable-workflows/.github/workflows/tag-and-release.yml@67ef4a8614e14d29e0039410f41a7ab9a7af093f # v1.58.0
    with:
      tag_name: ${{ inputs.tag_name }}
      release_notes: ${{ inputs.release_notes }}
      create_release: ${{ inputs.create_release }}

  # GitHub does not run tag-push workflows when the tag was created with GITHUB_TOKEN; dispatch the same job explicitly.
  trigger-container-builds:
    needs: tag
    if: success()
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Determine ref for container builds
        id: ref
        run: |
          git fetch --tags --force
          TAG="${{ inputs.tag_name }}"
          if [ "$TAG" = "auto" ] || [ -z "$TAG" ]; then
            REF=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          else
            REF="$TAG"
          fi
          if [ -z "$REF" ]; then
            echo "::error::Could not resolve a tag ref for container builds."
            exit 1
          fi
          echo "Using ref: $REF"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Dispatch container workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh workflow run container.yml
          --ref "${{ steps.ref.outputs.ref }}"
          -f grype_fail_build=${{ inputs.container_grype_fail_build }}
