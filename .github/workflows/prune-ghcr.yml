name: "Prune GHCR images"

# Thin caller. The pruning logic lives in
# hwinther/reusable-workflows/.github/workflows/prune-ghcr.yml — see that
# workflow's header for the rules (untagged-orphan vs OCI 1.1 attestation,
# dead-branch prerelease tags, cosign legacy sig/att, etc.).
#
# Auth note:
#   ghcr.io/wshno/* is an ORG-scoped registry. The repo's GITHUB_TOKEN can
#   delete versions only when each package has "Inherit access from source
#   repository" enabled. If deletion 403s, set repo secret GHCR_PRUNE_TOKEN to
#   a PAT with `delete:packages` (and `read:packages` if you want auto-discovery
#   to enumerate private packages). Passed through via secrets: inherit.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "When false, actually delete versions. Cron runs always force false."
        type: boolean
        default: true
      images:
        description: "Comma-separated package names to prune. Blank = let the reusable workflow auto-discover by prefix."
        type: string
        default: "wshno/web"
      nuke_package:
        description: "DESTRUCTIVE. Package name (e.g. 'wshno/web') to delete entirely — leave blank for normal smart prune."
        type: string
        default: ""
  schedule:
    # Sundays 03:00 UTC. Cron always runs live (dry_run forced to false).
    - cron: "0 3 * * 0"

permissions:
  contents: read
  packages: write

concurrency:
  group: prune-ghcr
  cancel-in-progress: false

jobs:
  prune:
    permissions:
      contents: read
      packages: write
    uses: hwinther/reusable-workflows/.github/workflows/prune-ghcr.yml@67ef4a8614e14d29e0039410f41a7ab9a7af093f # v1.58.0
    with:
      dry_run: ${{ github.event_name == 'schedule' && false || inputs.dry_run }}
      # Schedule events don't expose `inputs`, so mirror the workflow_dispatch
      # default as a single-line comma string. Keep this in sync with the
      # `images` input default above.
      images: ${{ inputs.images || 'wshno/web' }}
      package_namespace_prefix: wshno/
      # When set on a manual run, bypasses the smart prune and deletes the
      # entire named package via the GHCR package DELETE API. Cron runs leave
      # inputs.nuke_package null so this resolves to '' and the smart prune
      # runs as usual.
      nuke_package: ${{ inputs.nuke_package || '' }}
    secrets: inherit
