name: "Publish web container to GHCR"

on:
  workflow_dispatch:
    inputs:
      grype_fail_build:
        description: "Fail the build if Grype finds vulnerabilities"
        type: boolean
        default: true
  push:
    tags:
      - "v*"
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "vite.config.js"
      - "Dockerfile"
      - "nginx.conf"
      - ".dockerignore"
      - ".github/workflows/container.yml"

concurrency:
  group: "${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}"
  cancel-in-progress: true

jobs:
  web_container:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'pull_request'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      actions: write
      security-events: write
      pull-requests: write
    uses: hwinther/reusable-workflows/.github/workflows/docker-container.yml@25185e2df48cbdd90df1a8ec70b01e9911aaadbc # v1.56.0
    with:
      container_registry: ghcr.io
      container_image_name_postfix: web
      build_context: .
      dockerfile: Dockerfile
      grype_fail_build: ${{ github.event_name != 'workflow_dispatch' || fromJSON(github.event.inputs.grype_fail_build || 'true') }}
