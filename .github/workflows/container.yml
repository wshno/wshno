name: "Publish web container to GHCR"

on:
  workflow_dispatch:
    inputs:
      grype_fail_build:
        description: "Fail the build if Grype finds vulnerabilities"
        type: boolean
        default: true
  push:
    tags:
      - "v*"
  pull_request:
    # `labeled` so adding `deploy-feature` to an already-open PR triggers a deploy without a new push.
    types: [opened, synchronize, reopened, labeled]
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "vite.config.js"
      - "Dockerfile"
      - "nginx.conf"
      - ".dockerignore"
      - ".github/workflows/container.yml"

concurrency:
  group: "${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}"
  cancel-in-progress: true

jobs:
  web_container:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'pull_request'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
      actions: write
      security-events: write
      pull-requests: write
    uses: hwinther/reusable-workflows/.github/workflows/docker-container.yml@f65228ea4276b3ff26409146ccd1191c728c811a # v1.65.0
    with:
      container_registry: ghcr.io
      container_image_name_postfix: web
      build_context: .
      dockerfile: Dockerfile
      grype_fail_build: ${{ github.event_name != 'workflow_dispatch' || fromJSON(github.event.inputs.grype_fail_build || 'true') }}

  # Deploy a per-PR preview env when the PR carries the `deploy-feature` label. web_container above
  # already built + pushed the image, so we just hand its tag + digest to the generic preview-upsert
  # reusable, which renders the per-PR overlay into hwinther/proxmox. Flux reconciles within ~1 min at
  # https://wshno-<PR>.preview.wsh.no — no merge or manual image bump needed to see the changes.
  preview:
    needs: web_container
    if: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'deploy-feature') }}
    permissions:
      contents: read
    uses: hwinther/reusable-workflows/.github/workflows/gitops-preview-upsert.yml@f65228ea4276b3ff26409146ccd1191c728c811a # v1.65.0
    with:
      target_repo: hwinther/proxmox
      preview_base_path: clusters/production/apps/previews/wshno
      pr_number: ${{ github.event.pull_request.number }}
      app_name: wshno
      host: wshno-${{ github.event.pull_request.number }}.preview.wsh.no
      image_tag: ${{ needs.web_container.outputs.version }}
      image_digest: ${{ needs.web_container.outputs.image_digest }}
    secrets:
      app_id: ${{ secrets.PROXMOX_GITOPS_APP_ID }}
      app_private_key: ${{ secrets.PROXMOX_GITOPS_APP_PRIVATE_KEY }}

  preview-comment:
    needs: preview
    if: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'deploy-feature') }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post preview URL
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: wshno-preview-env
          message: |
            ### Preview environment deployed

            🔍 https://wshno-${{ github.event.pull_request.number }}.preview.wsh.no

            Refreshes on every push to this PR while the `deploy-feature` label is set; torn down when
            the PR closes. (The /status page's live data is only wired up in production, so it reads
            "could not load" here.)
