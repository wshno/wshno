name: "PR build for wsh-site"

# Thin trigger: delegates typecheck/build to the pr-build reusable workflow.
# node-only repo; dotnet/python disabled. No test script defined yet, so
# node_test_enabled is false until tests land.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.ref }}"
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pr-build:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    permissions:
      contents: read
      packages: read
      pull-requests: write
      checks: write
    uses: hwinther/reusable-workflows/.github/workflows/pr-build.yml@67ef4a8614e14d29e0039410f41a7ab9a7af093f # v1.58.0
    secrets: inherit
    with:
      node_enabled: true
      node_version: "24.x"
      node_test_enabled: false
